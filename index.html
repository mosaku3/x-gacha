        // URLからポストID（数字の羅列）を抽出する関数
        function extractTweetId(url) {
            const match = url.match(/\/status\/(\d+)/);
            return match ? match[1] : null;
        }

        // ガチャを引く処理
        function drawGacha() {
            // UIの状態切り替え
            drawBtn.classList.add('hidden');
            headerArea.classList.add('hidden');
            
            // ローディング表示
            resultArea.classList.add('hidden');
            loading.classList.remove('hidden');

            // ツイートコンテナを一時的に透明化
            tweetContainer.style.opacity = '0';
            tweetContainer.innerHTML = ''; // 前回の結果をクリア

            // ランダムに運勢を選択
            const randomFortune = fortunes[Math.floor(Math.random() * fortunes.length)];
            fortuneResult.textContent = randomFortune.text;
            fortuneResult.className = `text-4xl font-black mb-2 drop-shadow-sm ${randomFortune.color}`;
            fortuneDesc.textContent = randomFortune.desc; // 説明文を表示

            // ランダムにURLを選択
            const randomUrl = postUrls[Math.floor(Math.random() * postUrls.length)];
            
            // おすすめ引用ポスト用のテキスト
            const shareRecommendText = `もさくじ引いたよ！\n結果は${randomFortune.text}\nおすすめポストは ${randomUrl}\n#もさくじ`;
            quoteRecommendBtn.href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareRecommendText)}`;

            // もさくじ引用ポスト用のテキスト
            const shareAppText = `もさくじ引いたよ！\n結果は${randomFortune.text}\n\nhttps://mosaku3.github.io/x-gacha/index.html\n#もさくじ`;
            quoteAppBtn.href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareAppText)}`;

            // URLリンクのHTMLを生成
            const urlHtml = `
                <div class="w-full break-all">
                    <a href="${randomUrl}" target="_blank" rel="noopener noreferrer" class="text-blue-500 hover:text-blue-700 underline font-medium text-sm transition-colors">
                        ${randomUrl}
                    </a>
                </div>
            `;
            tweetContainer.innerHTML = urlHtml;

            // ガチャの演出として、少し待ってから結果を表示
            setTimeout(() => {
                loading.classList.add('hidden');
                resultArea.classList.remove('hidden');
                tweetContainer.style.opacity = '1';
                
                // アニメーションを付与
                tweetContainer.classList.remove('bounce-animation');
                void tweetContainer.offsetWidth; // リフローを強制してアニメーションをリセット
                tweetContainer.classList.add('bounce-animation');
            }, 800); // 0.8秒待機
        }

        // 初期状態に戻す処理
        function resetUI() {
            resultArea.classList.add('hidden');
            headerArea.classList.remove('hidden');
            drawBtn.classList.remove('hidden');
            tweetContainer.innerHTML = '';
        }

        // イベントリスナーの設定
        drawBtn.addEventListener('click', drawGacha);
        retryBtn.addEventListener('click', resetUI);
    </script>
