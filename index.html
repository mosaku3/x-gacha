        .bounce-animation {
            animation: bounce-in 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }
        @keyframes bounce-in {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* ツイート表示エリアのスクロール（Player Card内で見切れないようにするため） */

        // URLからポストID（数字の羅列）を抽出する関数
        function extractTweetId(url) {
            const match = url.match(/\/status\/(\d+)/);
            return match ? match[1] : null;
        }

        // ガチャを引く処理
        function drawGacha() {
            // UIの状態切り替え
            drawBtn.classList.add('hidden');
            headerArea.classList.add('hidden');
            resultArea.classList.add('hidden');
            loading.classList.remove('hidden');
            tweetContainer.innerHTML = ''; // 前回の結果をクリア

            // ランダムにURLを選択し、IDを抽出
            const randomUrl = postUrls[Math.floor(Math.random() * postUrls.length)];
            const tweetId = extractTweetId(randomUrl);

            // 引用ポスト用のURLを生成してボタンにセット
            const shareText = "過去のメディアガチャを引いたよ！💊\n";
            quoteBtn.href = `https://twitter.com/intent/tweet?url=${encodeURIComponent(randomUrl)}&text=${encodeURIComponent(shareText)}`;

            if (!tweetId) {
                alert("URLの形式が正しくないようです。");
                resetUI();
                return;
            }

            // フォールバック用のHTML（ウィジェットがブロックされた時用）
            const fallbackHtml = `
                <div class="p-5 text-center w-full">
                    <p class="text-gray-700 text-sm font-bold mb-4">プレビュー環境による制限、<br>または読み込みに時間がかかっています。</p>
                    <a href="${randomUrl}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center justify-center px-5 py-2.5 bg-black hover:bg-gray-800 text-white rounded-full text-sm font-bold transition-colors w-full shadow-md">
                        𝕏 でポストを開く
                        <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                    </a>
                </div>
            `;

            // タイムアウト処理（3秒待機に短縮）
            let isLoaded = false;
            const timeoutId = setTimeout(() => {
                if (!isLoaded) {
                    loading.classList.add('hidden');
                    resultArea.classList.remove('hidden');
                    tweetContainer.innerHTML = fallbackHtml;
                }
            }, 3000);

            // Xウィジェットのロード完了を待ってからツイートを埋め込む
            if (window.twttr && window.twttr.ready) {
                window.twttr.ready(function (twttr) {
                    twttr.widgets.createTweet(
                        tweetId,
                        tweetContainer,
                        {
                            theme: 'light',
                            align: 'center',
                            conversation: 'none', // リプライツリーを非表示
                            cards: 'visible'      // メディア（画像/動画）を表示
                        }
                    ).then(function (el) {
                        isLoaded = true;
                        clearTimeout(timeoutId);

                        // 埋め込み完了後の処理
                        loading.classList.add('hidden');
                        resultArea.classList.remove('hidden');
                        
                        // ツイートが削除されている等の理由で表示できなかった場合
                        if (!el) {
                            tweetContainer.innerHTML = fallbackHtml;
                        } else {
                            // アニメーションを付与
                            tweetContainer.classList.remove('bounce-animation');
                            void tweetContainer.offsetWidth; // リフローを強制してアニメーションをリセット
                            tweetContainer.classList.add('bounce-animation');
                        }
                    }).catch(function(err) {
                        // エラーハンドリング
                        isLoaded = true;
                        clearTimeout(timeoutId);
                        loading.classList.add('hidden');
                        resultArea.classList.remove('hidden');
                        tweetContainer.innerHTML = fallbackHtml;
                        console.error("X widget load error:", err);
                    });
                });
            } else {
                isLoaded = true;
                clearTimeout(timeoutId);
                loading.classList.add('hidden');
                resultArea.classList.remove('hidden');
                tweetContainer.innerHTML = fallbackHtml;
            }
        }

        // 初期状態に戻す処理
        function resetUI() {
            resultArea.classList.add('hidden');
            headerArea.classList.remove('hidden');
            drawBtn.classList.remove('hidden');
            tweetContainer.innerHTML = '';
        }

        // イベントリスナーの設定
        drawBtn.addEventListener('click', drawGacha);
        retryBtn.addEventListener('click', resetUI);
    </script>
</body>
</html>
